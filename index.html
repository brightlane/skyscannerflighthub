<script>
  // Dynamic year
  document.getElementById("currentYearDeals").textContent = new Date().getFullYear();

  // Countdown timer function
  function startCountdown(elementId, hours) {
    const endTime = new Date().getTime() + hours*60*60*1000;
    const interval = setInterval(() => {
      const now = new Date().getTime();
      const distance = endTime - now;
      if(distance < 0){
        document.getElementById(elementId).textContent = "Deal expired!";
        clearInterval(interval);
        return;
      }
      const h = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
      const m = Math.floor((distance % (1000*60*60)) / (1000*60));
      const s = Math.floor((distance % (1000*60)) / 1000);
      document.getElementById(elementId).textContent = `⏳ ${h}h ${m}m ${s}s left`;
    }, 1000);
  }

  // Start countdowns for each deal (e.g., 12 hours)
  startCountdown("countdownNY", 12);
  startCountdown("countdownParis", 12);
  startCountdown("countdownDubai", 12);
</script>
