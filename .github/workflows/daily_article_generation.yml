name: Daily Article Generation

on:
  schedule:
    - cron: '0 7 * * *'  # Runs daily at 7:00 AM UTC

  # Allows the workflow to be manually triggered
  workflow_dispatch:  # This enables the "Run" button

jobs:
  generate_articles:
    runs-on: ubuntu-latest  # Specifies the operating system for the job

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2  # Checkout the repository to access files

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'  # Adjust the Python version as needed

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gitpython  # Install GitPython for git operations

    - name: Run the article generation script
      run: |
        python article_generator.py  # Run the script to generate the articles

    - name: Commit and push new articles
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add articles/*  # Add the new articles to git
        git commit -m "Daily generated articles"
        git push  # Push the changes to GitHub
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Token to authenticate with GitHub
