name: Daily Article Generation

on:
  schedule:
    # This cron syntax means it will run at midnight UTC every day
    - cron: '0 0 * * *'

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'  # Use the latest version of Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # This assumes you have a requirements.txt file for dependencies (e.g., GitPython)

      - name: Run article generator script
        run: |
          python article_generator.py  # Adjust if your script name is different

      - name: Commit and push new articles
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add articles/*  # Add all new articles
          git commit -m "Generate new articles for the day"
          git push origin main  # Replace 'main' with your branch name if different
