<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bulk Social Media Engine</title>

<style>
body { font-family: Arial; max-width:1000px; margin:auto; padding:20px; }
textarea { width:100%; height:80px; }
button { padding:12px 18px; margin:5px; background:#0770E3; color:white; border:none; cursor:pointer; }
.box { background:#f5f6fa; padding:10px; margin-top:8px; white-space:pre-wrap; font-size:12px; }
</style>
</head>

<body>

<h1>Bulk Social Media Post Generator</h1>

<p>Enter topic (e.g. Cheap Flights to Tokyo)</p>

<textarea id="topic"></textarea>

<button onclick="generate(100)">Generate 100 Posts</button>
<button onclick="generate(500)">Generate 500 Posts</button>
<button onclick="generate(1000)">Generate 1000 Posts</button>

<button onclick="download()">Download Posts</button>

<div id="output"></div>

<script>

const affiliate = "http://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885";

const hooks = [
"✈️ Prices just dropped for",
"🔥 Travel deal alert:",
"💸 Stop overpaying for",
"🚨 New flight deals for",
"🌍 Planning a trip to"
];

const endings = [
"Check prices now:",
"Compare flights here:",
"See live fares:",
"Find deals here:",
"Search now:"
];

const extras = [
"Flights are changing daily in 2026.",
"Airfare prices fluctuate fast.",
"Demand is shifting prices constantly.",
"Smart travelers compare before booking.",
"Don't miss cheaper routes."
];

// RANDOM
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

let posts = [];

function makePost(topic){

return `${rand(hooks)} ${topic}

${rand(extras)}

${rand(endings)}
${affiliate}`;
}

// GENERATE BULK
function generate(amount){

posts = [];
let output = "";

let topic = document.getElementById("topic").value;

for(let i=0;i<amount;i++){
let post = makePost(topic);
posts.push(post);

output += `<div class="box">${post}</div>`;
}

document.getElementById("output").innerHTML = output;
}

// DOWNLOAD
function download(){
const blob = new Blob([posts.join("\n\n-----------------\n\n")], {type:"text/plain"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "social-posts.txt";
a.click();
}

</script>

</body>
</html>
