name: Daily Article Generation

on:
  schedule:
    - cron: '0 7 * * *'  # Runs at 7:00 AM UTC daily

jobs:
  generate_articles:
    runs-on: ubuntu-latest  # This specifies the operating system for the job

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2  # Action to clone the repository

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'  # Use the Python version you're using

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gitpython  # Install GitPython for Git operations

    - name: Run the article generation script
      run: |
        python article_generator.py  # Running your script to generate articles

    - name: Commit and push new articles
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add articles/*  # Add new articles to the staging area
        git commit -m "Daily generated articles"
        git push  # Push the articles to GitHub
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Token to authenticate with GitHub
