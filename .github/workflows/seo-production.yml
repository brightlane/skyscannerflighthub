name: SEO Production Engine

on:
  workflow_dispatch:   # ▶️ Run button in GitHub Actions
  schedule:
    - cron: "0 0 * * *"  # 🌍 runs daily (UTC midnight)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies (important for git + requests)
      - name: Install dependencies
        run: pip install requests

      # 4. Build articles
      - name: Generate international articles
        run: python engineinternational_geo_builder.py

      # 5. Inject internal links
      - name: Inject internal links
        run: python engine_internal_linker_v4.py

      # 6. Generate sitemap
      - name: Generate sitemap
        run: python engine_geo_sitemap_v2.py

      # 7. SEO control (ping + indexing signals)
      - name: SEO control center
        run: python engine_seo_control_center_v2.py

      # 8. Health check (optional safety layer)
      - name: System health check
        run: python engine_health_check_v5.py

      # 9. Commit changes back to repo
      - name: Commit and push updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Automated SEO production run"
          git push
