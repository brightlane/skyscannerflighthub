<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Lookup & Interactive Tips</title>
<meta name="description" content="Explore global countries, cities, and dynamic multilingual tips with interactive insights.">
<meta name="robots" content="index, follow">
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#0b1d3a; color:#f1f1f1; }
header, section, footer { max-width:900px; margin:0 auto; padding:20px; }
h1,h2,h3,h4 { margin:10px 0; }
h1 { font-size:2.5rem; cursor:pointer; color:#ffd700; transition: color 0.3s ease; }
h1:hover { color:#ffcc00; }
p { margin:10px 0; line-height:1.6; }
.btn-cta { background:#ffd700; color:#0b1d3a; padding:15px 30px; font-weight:bold; text-decoration:none; border-radius:5px; display:inline-block; margin:20px 0; transition: transform 0.2s ease, box-shadow 0.2s ease; }
.btn-cta:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.tip-box, .date-box { background:#11254d; padding:20px; border-radius:8px; margin:20px 0; box-shadow:0 2px 8px rgba(0,0,0,0.5); }
#stickyCTA { position:fixed; bottom:20px; right:20px; z-index:9999; }
#progressBar { position:fixed; top:0; left:0; width:0%; height:5px; background:#ffd700; z-index:9999; transition: width 0.25s ease; }
a { color:#ffd700; text-decoration:none; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>

<!-- Scroll Progress -->
<div id="progressBar"></div>

<!-- HERO SECTION -->
<header style="text-align:center; padding:80px 20px;">
  <h1 id="headline">Global Lookup & Interactive Tips</h1>
  <p>Explore countries, cities, and interactive tips worldwide. Dynamic multilingual content updated daily.</p>
  <a href="https://is.gd/et9lWW" class="btn-cta" id="mainCTA" target="_blank">Take Action →</a>
</header>

<section>
  <!-- Current Date -->
  <div class="date-box">
    📅 Today's Date: <span id="currentDate"></span>
  </div>

  <!-- Daily Tip -->
  <div class="tip-box">
    💡 Daily Tip: <span id="dailyTip"></span>
  </div>
</section>

<!-- STICKY CTA -->
<a href="https://is.gd/et9lWW" id="stickyCTA" class="btn-cta" target="_blank">Take Action →</a>

<footer style="text-align:center; padding:20px; color:#ccc;">
  <p>Dynamic interactive content worldwide. Fully multilingual.</p>
  <p>&copy; <span id="currentYear"></span> DynamicLookup.com</p>
</footer>

<script>
// Scroll Progress
window.onscroll = function() {
  const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
  const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const scrolled = (scrollTop / scrollHeight) * 100;
  document.getElementById("progressBar").style.width = scrolled + "%";
};

// Current Date & Year
const today = new Date();
document.getElementById("currentDate").textContent = today.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
document.getElementById("currentYear").textContent = today.getFullYear();

// Daily Tips
let languages = [
  {code:"en",name:"English"},
  {code:"es",name:"Spanish"},
  {code:"fr",name:"French"},
  {code:"zh",name:"Chinese"},
  {code:"ar",name:"Arabic"},
  {code:"hi",name:"Hindi"}
];
function getDailyTip(){
  const tips = [
    "Explore new regions for insight.",
    "Check local coverage regularly.",
    "Discover top destinations this week.",
    "Plan your trip with flexible dates."
  ];
  return tips[today.getDate() % tips.length];
}
document.getElementById("dailyTip").textContent = getDailyTip();

// Headline Clickable
document.getElementById("headline").onclick = ()=>window.open("https://is.gd/et9lWW","_blank");

// Sticky CTA Click
document.getElementById("mainCTA").onclick = ()=>window.open("https://is.gd/et9lWW","_blank");
document.getElementById("stickyCTA").onclick = ()=>window.open("https://is.gd/et9lWW","_blank");
</script>

</body>
</html>
