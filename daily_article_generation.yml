name: Daily Article Generation

on:
  schedule:
    - cron: '0 7 * * *'  # Run the action daily at 7:00 AM UTC (adjust if necessary)

jobs:
  generate_articles:
    runs-on: ubuntu-latest  # Use the latest Ubuntu environment

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2  # Checkout the repository to access the files

    - name: Set up Python environment
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'  # You can specify the Python version you're using

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gitpython  # GitPython is needed for git operations

    - name: Run the article generation script
      run: |
        python article_generator.py  # Run the Python script that generates the articles

    - name: Commit and push new articles
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add articles/*  # Add the new articles to git
        git commit -m "Daily generated articles"
        git push  # Push the changes to GitHub
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # This will automatically use a token to push to the repo
